<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Netlify form declarations</title>
    <meta name="robots" content="noindex,nofollow" />
  </head>
  <body>
    <!-- This file exists so Netlify's build bot can detect the forms used in the Next.js app. Do not remove. -->
    <form name="pws-newsletter" netlify netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="source" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
