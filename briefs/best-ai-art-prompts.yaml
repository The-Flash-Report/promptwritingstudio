faqs:
- question: What makes a good AI art prompt?
  answer: A good AI art prompt includes a clear subject, specific art style, lighting
    and mood descriptors, and technical modifiers like resolution and rendering engine.
    Structure and specificity matter more than length.
- question: Do the same prompts work on Midjourney and DALL-E?
  answer: Not always. Midjourney responds well to artistic and stylistic keywords
    while DALL-E 3 excels with natural language descriptions. You may need to adapt
    prompts for each platform.
- question: How long should an AI art prompt be?
  answer: Most effective prompts are 20 to 75 words. Too short and you lack detail.
    Too long and the AI may ignore parts. Focus on the most impactful descriptors.
- question: Can I use AI-generated art commercially?
  answer: It depends on the platform terms of service. Midjourney paid plans allow
    commercial use. DALL-E usage rights are granted to the creator. Always check the
    latest terms before selling AI art.
- question: What are negative prompts and should I use them?
  answer: Negative prompts tell the AI what to exclude from the image such as blurry,
    low quality, or extra limbs. They are especially useful in Stable Diffusion and
    can dramatically improve output quality.
- question: How do I get consistent style across multiple AI art pieces?
  answer: Use a seed number if the platform supports it, keep your style modifiers
    and artist references consistent, and use prompt templates with fixed structure
    while changing only the subject.
notes: Prompt Writing Studio audience is global so no specific Irish angle needed.
  Ensure all prompts are original and not copied from other sources. Include visual
  examples or placeholders for AI-generated sample images beside each prompt. Add
  a downloadable PDF or prompt pack as a lead magnet CTA. Avoid recommending prompts
  that reference living artists by name to sidestep ethical concerns. Include last-updated
  date for freshness signals. Interlink heavily to tool-specific guides on the site.
