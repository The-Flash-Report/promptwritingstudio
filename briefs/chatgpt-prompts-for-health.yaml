faqs:
- question: Can ChatGPT give accurate health advice?
  answer: ChatGPT can provide general health information but is not a medical professional.
    Always verify outputs with trusted sources and consult a doctor for personal health
    concerns.
- question: Is it safe to use ChatGPT for health questions?
  answer: It is safe for general research and wellness ideas but should never replace
    professional medical consultation, especially for serious symptoms or conditions.
- question: What are the best ChatGPT prompts for meal planning?
  answer: Effective meal planning prompts include specific dietary requirements, calorie
    targets, food preferences, and budget constraints to generate personalised weekly
    plans.
- question: Can ChatGPT create personalised fitness plans?
  answer: Yes, when given details like fitness level, available equipment, goals,
    and time commitment, ChatGPT can generate structured workout routines.
- question: How do I make ChatGPT health prompts more accurate?
  answer: Assign a specific expert role, provide detailed context, include constraints,
    and always cross-reference the output with reputable medical sources.
- question: Should I share personal health data with ChatGPT?
  answer: Avoid sharing sensitive personal health data. Use general parameters instead
    of identifiable information, and be aware of data privacy and GDPR implications.
